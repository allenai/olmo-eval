# Config with per-task priorities
#
# Tasks can have @priority suffixes to run at different Beaker priority levels.
# Tasks sharing the same priority will be batched together in one experiment per model.
#
# IMPORTANT: Priorities are set on TASKS, not on models. Each model runs all its
# tasks, but tasks are grouped by priority into separate experiments.
#
# Usage: olmo-eval launch -f examples/configs/prioritized_tasks.yaml --dry-run
#
# This config will create 6 experiments (2 models x 3 priority levels):
#   - eval-prioritized-llama3.1-8b-high     (gsm8k, arc_challenge)
#   - eval-prioritized-llama3.1-8b-normal   (hellaswag, winogrande)
#   - eval-prioritized-llama3.1-8b-low      (arc_easy, boolq)
#   - eval-prioritized-olmo-2-7b-high       (gsm8k, arc_challenge)
#   - eval-prioritized-olmo-2-7b-normal     (hellaswag, winogrande)
#   - eval-prioritized-olmo-2-7b-low        (arc_easy, boolq)

name: eval-prioritized

models:
  # Models define compute resources (GPUs)
  - name: llama3.1-8b
    gpus: 1
  - name: olmo-2-7b
    gpus: 1

tasks:
  - gsm8k@high
  - arc_challenge@high

  - hellaswag@normal
  - winogrande@normal

  - arc_easy@low
  - boolq@low

cluster: ai2/ceres
preemptible: true
timeout: 24h
